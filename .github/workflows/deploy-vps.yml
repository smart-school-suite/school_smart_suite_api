name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy (default: full commit SHA of this run)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        shell: bash
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Write environment file
        shell: bash
        run: |
          set -e
          mkdir -p /opt/school-smart
          cat > /opt/school-smart/.env <<'EOF'
          ${{ secrets.VPS_ENV_PRODUCTION }}
          EOF
          chmod 600 /opt/school-smart/.env

      - name: Deploy latest container
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          set -e
          cd /opt/school-smart

          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [ -n "$IMAGE_TAG_INPUT" ]; then
            TAG="$IMAGE_TAG_INPUT"
          else
            TAG="${GITHUB_SHA}"
          fi
          IMAGE="ghcr.io/${REPO_LC}:${TAG}"

          docker pull "$IMAGE"

          cat > docker-compose.yml <<EOF
          services:
            app:
              image: $IMAGE
              container_name: school-smart-app
              restart: unless-stopped
              ports:
                - "80:80"
              env_file:
                - .env
          EOF

          docker compose down || true
          docker compose up -d
          docker image prune -af || true
